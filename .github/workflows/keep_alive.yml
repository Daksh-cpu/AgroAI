name: Keep Streamlit App Awake

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit Dashboard
        # Sends a simple GET request to your Streamlit app url
        run: curl -s https://agroai-dashboard.streamlit.app > /dev/null || true
